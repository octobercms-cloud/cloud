services:
    app:
        build:
            context: .
            dockerfile: runtime/Dockerfile
        image: october-app
        ports:
            - '${APP_PORT:-80}:80'
        environment:
            APP_ENV: '${APP_ENV:-local}'
            APP_DEBUG: '${APP_DEBUG:-true}'
            APP_URL: '${APP_URL:-http://localhost}'
            DB_CONNECTION: pgsql
            DB_HOST: pgsql
            DB_PORT: '5432'
            DB_DATABASE: '${DB_DATABASE:-october}'
            DB_USERNAME: '${DB_USERNAME:-october}'
            DB_PASSWORD: '${DB_PASSWORD:-secret}'
            REDIS_HOST: redis
            REDIS_PORT: '6379'
            CACHE_STORE: '${CACHE_STORE:-redis}'
            SESSION_DRIVER: '${SESSION_DRIVER:-redis}'
            QUEUE_CONNECTION: '${QUEUE_CONNECTION:-redis}'
            AWS_ACCESS_KEY_ID: '${AWS_ACCESS_KEY_ID:-}'
            AWS_SECRET_ACCESS_KEY: '${AWS_SECRET_ACCESS_KEY:-}'
            AWS_DEFAULT_REGION: '${AWS_DEFAULT_REGION:-us-east-1}'
            AWS_PROFILE: '${AWS_PROFILE:-}'
            AWS_SDK_LOAD_CONFIG: 'true'
        volumes:
            - './october:/app'
            - 'october-vendor:/app/vendor'
            - '${HOME}/.aws:/root/.aws:ro'
        networks:
            - october
        depends_on:
            pgsql:
                condition: service_healthy
            redis:
                condition: service_started

    pgsql:
        image: postgres:18-alpine
        ports:
            - '${FORWARD_DB_PORT:-5432}:5432'
        environment:
            POSTGRES_DB: '${DB_DATABASE:-october}'
            POSTGRES_USER: '${DB_USERNAME:-october}'
            POSTGRES_PASSWORD: '${DB_PASSWORD:-secret}'
        volumes:
            - 'pgsql-data:/var/lib/postgresql'
            - './runtime/pgsql/create-testing-database.sql:/docker-entrypoint-initdb.d/10-create-testing-database.sql'
        networks:
            - october
        healthcheck:
            test:
                - CMD
                - pg_isready
                - '-q'
                - '-d'
                - '${DB_DATABASE:-october}'
                - '-U'
                - '${DB_USERNAME:-october}'
            retries: 3
            timeout: 5s

    redis:
        image: redis:7-alpine
        ports:
            - '${FORWARD_REDIS_PORT:-6379}:6379'
        volumes:
            - 'redis-data:/data'
        networks:
            - october

networks:
    october:
        driver: bridge

volumes:
    pgsql-data:
    redis-data:
    october-vendor:
